syntax = "proto3";
package grocer;

option go_package = "./out_proto";

message User {
  fixed64 userId = 1;
  string name = 2;
  string username = 3;
  string passwordHash = 4;
}

message Session {
  fixed64 sessionId = 1;
  string token = 2;
  fixed64 userId = 3;
}

message Item {
  fixed64 itemId = 1;
  string name = 2;
  optional string photoPath = 3;
  string category = 4;
  uint64 userId = 5;
}

message Merchant {
  fixed64 merchantId = 1;
  string name = 2;
}

message ReceiptItem {
  fixed64 itemId = 1;
  uint32 quantity = 2;
  float price = 3;
}

message Receipt {
  fixed64 receiptId = 1;
  fixed64 merchantId = 2;
  optional string photoPath = 3;
  repeated ReceiptItem items = 4;
}

message Proposal {
  fixed64 proposalId = 1;
  fixed64 userId = 2;
  Receipt receipt = 3;
  repeated Item items = 4;
}

message MerchantAlias {
  fixed64 merchantAliasId = 1;
  string alias = 2;
  repeated fixed64 merchantId = 3;
}

message ItemAlias {
  fixed64 itemAliasId = 1;
  string alias = 2;
  repeated fixed64 itemId = 3;
}
  