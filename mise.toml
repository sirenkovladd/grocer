[env]
_.file = ".env"
GIT_COMMIT = "{{exec(command='git rev-parse --short HEAD')}}"

[settings]
task_output = "interleave"

[tasks.proto]
sources = ["proto/grocer.proto"]
outputs = ["proto/out_proto/*"]
run = "protoc --go_out=. --go_opt=paths=source_relative proto/grocer.proto && mv proto/grocer.pb.go proto/out_proto/"

[tasks.build_client]
run = [
  "rm -rf dist",
  "bun build --sourcemap=inline --outdir=dist ./client/index.html",
]
outputs = ["dist/*"]
sources = ["client/*"]

[tasks.build_client_prod]
run = [
  "rm -rf dist",
  "bun build --outdir=dist --production ./client/index.html",
]
outputs = ["dist/*"]
sources = ["client/*"]

[tasks.start_server]
env.BUILD_TIME = "{{exec(command='date -u +%Y-%m-%dT%H:%M:%SZ')}}"
run = "go run ./cmd/server"
sources = ["**/*.go"]

[tasks.build_server]
env.GIT_COMMIT = "{{exec(command='git rev-parse --short HEAD')}}"
env.BUILD_TIME = "{{exec(command='date -u +%Y-%m-%dT%H:%M:%SZ')}}"
env.FLAG = "-s -w -X 'main.GitCommit={{env.GIT_COMMIT}}' -X 'main.BuildTime={{env.BUILD_TIME}}'"
run = "go build -ldflags '{{env.FLAG}}' -o ./dist/server ./cmd/server"
sources = ["**/*.go"]
outputs = ["dist/server"]

[tasks.create_user]
run = "go run ./cmd/server --create-user --name {{arg(name='name')}} --username {{arg(name='username')}} --password {{arg(name='password')}}"

[tasks.link_bot]
run = "go run ./cmd/server --link-bot --username {{arg(name='username')}} --{{arg(name='platform')}} {{arg(name='id')}}"

[tasks.backup_export]
run = "go run ./cmd/backup export {{arg(name='output', default='snapshot.pb.gz')}}"

[tasks.backup_import]
run = "go run ./cmd/backup import {{arg(name='file')}}"

[tasks.docker_build]
run = "docker build -f deploy/Dockerfile -t grocer ."

[tasks.docker_up]
run = "docker compose -f deploy/docker-compose.yml up"

[tasks.docker_down]
run = "docker compose -f deploy/docker-compose.yml down"

[tools]
bun = "latest"
go = "latest"
